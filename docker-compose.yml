version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    ports:
      - "5672:5672"      # AMQP (clientes)
      - "15672:15672"    # Management UI (opcional)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    command: >
      sh -c "
        echo 'loopback_users = none' > /etc/rabbitmq/conf.d/loopback.conf &&
        rabbitmq-server
      "
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  signaling:
    build: .
    restart: unless-stopped
    ports:
      - "50051:50051"   # gRPC
      - "5000:5000"     # Flask REST (opcional)
    depends_on:
      - rabbitmq
    environment:
      - RABBITMQ_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_PASS=${RABBITMQ_PASS:-guest}
      - RABBITMQ_HOST=rabbitmq
      - SECRET_KEY=${SECRET_KEY:-cambia_esta_clave_secreta_muy_larga}
    volumes:
      - ./groupsapp.db:/app/groupsapp.db

volumes:
  rabbitmq_data: